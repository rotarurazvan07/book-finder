name: Build and Publish Dashboard Images

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Required for linux/arm64 cross-compilation on an amd64 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ────────────────────────────────────────────────────────────
      # Build context must be the REPO ROOT so book_framework/ is in scope
      - name: Build and push — backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: book_dashboard/backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/book-finder-backend:latest
          provenance: false
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      # ── Frontend ───────────────────────────────────────────────────────────
      # Build context is the frontend folder only
      - name: Build and push — frontend
        uses: docker/build-push-action@v5
        with:
          context: book_dashboard/frontend
          file: book_dashboard/frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/book-finder-frontend:latest
          provenance: false
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend