name: Book Scraper

on:
  schedule:
    - cron: '0 20 * * 6'
  workflow_dispatch:

env:
  SCRAPE_KIT_LOG_LEVEL: INFO

jobs:
  prepare-scrape:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r setup/requirements-scrape.txt
          scrapling install
      - name: Generate Matrix
        id: set-matrix
        run: |
          JSON_DATA=$(./venv/bin/python -m book_crawler.crawl --mode "prepare-scrape" --runners "all" --config_dir "book_framework/config")
          echo "matrix={\"include\":$JSON_DATA}" >> $GITHUB_OUTPUT

  scrape:
    needs: prepare-scrape
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-scrape.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r setup/requirements-scrape.txt
          scrapling install
      - name: Run Scraper
        run: |
          ./venv/bin/python -m book_crawler.crawl --mode "scrape" \
            --books_db_path "${{ matrix.books_db_path }}" \
            --urls "${{ matrix.urls }}" \
            --config_dir "book_framework/config"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.books_db_path }}
          path: ${{ matrix.books_db_path }}
          retention-days: 7

  merge:
    needs: scrape
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          pattern: scrape_*
          merge-multiple: true
      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r setup/requirements-scrape.txt
      - name: Merge Databases
        run: |
          ./venv/bin/python -m book_crawler.crawl --mode merge \
            --chunks_dir "." \
            --books_db_path "scrape_merged.db" \
            --config_dir "book_framework/config"
      - name: Upload Final Database
        uses: actions/upload-artifact@v4
        with:
          name: all-stores-combined-db
          path: scrape_merged.db
          retention-days: 7

  prepare-rate:
    needs: [merge]
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r setup/requirements-scrape.txt

      - name: Download Final Database
        uses: actions/download-artifact@v4
        with:
          name: all-stores-combined-db
          path: .

      - name: Generate Chunks
        id: set-matrix
        run: |
          JSON_DATA=$(./venv/bin/python -m book_crawler.crawl --mode prepare-rate --books_db_path "scrape_merged.db" --chunks_dir ".")
          echo "matrix={\"include\":$JSON_DATA}" >> $GITHUB_OUTPUT

      - name: Upload Input Chunks
        uses: actions/upload-artifact@v4
        with:
          name: rate-json-chunks
          path: "*.json"
          retention-days: 7

  rate:
    needs: prepare-rate
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-rate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r setup/requirements-scrape.txt
          scrapling install

      - name: Download Input Chunks
        uses: actions/download-artifact@v4
        with:
          name: rate-json-chunks
          path: .

      - name: Rate Books
        run: |
          ./venv/bin/python -m book_crawler.crawl --mode rate \
            --urls "${{ matrix.urls }}" \
            --books_db_path "${{ matrix.books_db_path }}" \
            --config_dir "book_framework/config"

      - name: Upload Result Chunk
        uses: actions/upload-artifact@v4
        with:
          name: rated-${{ matrix.books_db_path }}
          path: ${{ matrix.books_db_path }}
          retention-days: 7

  apply-ratings:
    needs: [merge, rate]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r setup/requirements-scrape.txt
      - name: Download Master DB
        uses: actions/download-artifact@v4
        with:
          name: all-stores-combined-db
          path: .

      - name: Download Rating Results
        uses: actions/download-artifact@v4
        with:
          pattern: rated-*
          merge-multiple: true

      - name: Apply Ratings
        run: |
          ./venv/bin/python -m book_crawler.crawl --mode apply-rates \
            --books_db_path "scrape_merged.db" \
            --chunks_dir "."

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-db
          name: Latest Books Database
          files: scrape_merged.db
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
