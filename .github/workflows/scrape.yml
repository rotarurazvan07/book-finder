name: Book Scraper

on:
  schedule:
    - cron: '0 20 * * 6'
  workflow_dispatch:

jobs:
  prepare-scrape:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          pip install -r setup/requirements-scrape.txt
          scrapling install
      - name: Generate Matrix
        id: set-matrix
        run: |
          JSON_DATA=$(python main.py --mode "prepare-scrape" --runners "all")
          echo "matrix={\"include\":$JSON_DATA}" >> $GITHUB_OUTPUT

  scrape:
    needs: prepare-scrape
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-scrape.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          pip install -r setup/requirements-scrape.txt
          scrapling install
      - name: Run Scraper
        run: python main.py --mode "scrape" --books_db_path "${{ matrix.books_db_path }}" --urls "${{ matrix.urls }}"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.books_db_path }}
          path: ${{ matrix.books_db_path }}
          retention-days: 7

  merge:
    needs: scrape
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          pattern: chunk-*
          merge-multiple: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r setup/requirements-scrape.txt
      - name: Merge Databases
        run: python main.py --mode merge --chunks_dir "." --books_db_path "final_books.db"
      - name: Upload Final Database
        uses: actions/upload-artifact@v4
        with:
          name: all-stores-combined-db
          path: final_books.db
          retention-days: 7

  prepare-rate:
    needs: [merge]
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r setup/requirements-scrape.txt

      - name: Download Final Database
        uses: actions/download-artifact@v4
        with:
          name: all-stores-combined-db
          path: .

      - name: Generate Chunks
        id: set-matrix
        run: |
          JSON_DATA=$(python main.py --mode prepare-rate --books_db_path "final_books.db" --chunks_dir ".")
          echo "matrix={\"include\":$JSON_DATA}" >> $GITHUB_OUTPUT

      - name: Upload Input Chunks
        uses: actions/upload-artifact@v4
        with:
          name: rate-json-chunks
          path: "*.json"
          retention-days: 7

  rate:
    needs: prepare-rate
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-rate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r setup/requirements-scrape.txt
          scrapling install

      - name: Download Input Chunks
        uses: actions/download-artifact@v4
        with:
          name: rate-json-chunks
          path: .

      - name: Rate Books
        run: |
          python main.py --mode rate \
            --urls "${{ matrix.urls }}" \
            --books_db_path "${{ matrix.books_db_path }}"

      - name: Upload Result Chunk
        uses: actions/upload-artifact@v4
        with:
          name: rated-${{ matrix.books_db_path }}
          path: ${{ matrix.books_db_path }}
          retention-days: 7

  apply-ratings:
    needs: [merge, rate]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r setup/requirements-scrape.txt
      - name: Download Master DB
        uses: actions/download-artifact@v4
        with:
          name: all-stores-combined-db
          path: .

      - name: Download Rating Results
        uses: actions/download-artifact@v4
        with:
          pattern: rated-*
          merge-multiple: true

      - name: Apply Ratings
        run: |
          python main.py --mode apply-rates \
            --books_db_path "final_books.db" \
            --chunks_dir "."

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-db
          name: Latest Books Database
          files: final_books.db
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}