name: book-finder-dashboard

services:
  backend:
    build:
      context: .
      dockerfile: book_dashboard/backend/Dockerfile
    image: ghcr.io/rotarurazvan07/book-finder-backend:latest
    restart: unless-stopped
    environment:
      # We set the runtime path here
      - BOOKS_DB_PATH=/app/workspace/data/final_books.db
      - PYTHONPATH=/app
    volumes:
      # Map your local workspace folder to the app's workspace
      - ./workspace:/app/workspace
    expose:
      - "8000"
    healthcheck:
      # Simplified healthcheck for 2026
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/filters || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: ghcr.io/rotarurazvan07/book-finder-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy