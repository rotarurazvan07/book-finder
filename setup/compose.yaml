name: book-finder-dashboard

services:
  backend:
    build:
      context: .
      dockerfile: book_dashboard/backend/Dockerfile
    image: ghcr.io/rotarurazvan07/book-finder-backend:latest
    container_name: book-backend
    restart: unless-stopped
    environment:
      - BOOKS_DB_PATH=/app/workspace/data/final_books.db
      - PYTHONPATH=/app
    command:
      sh -c "mkdir -p /app/workspace/config && mkdir -p /app/workspace/data &&
             cp -r /app/config/. /app/workspace/config/"
    volumes:
      - ./workspace:/app/workspace
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "8000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=book-stack"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/filters')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: ghcr.io/rotarurazvan07/book-finder-frontend:latest
    container_name: book-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./workspace:/app/workspace
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=book-stack"

  book-updater:
    image: containrrr/watchtower:1.7.1
    container_name: book-updater
    restart: always
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --scope book-stack --label-enable