server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Proxy /api/ calls to the backend
    location /api/ {
        # If your FastAPI routes ALREADY include "/api/", keep it like this:
        proxy_pass http://backend:8000;

        # Performance & Header Forwarding
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Helpful for long-running DB queries or book processing
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    # SPA Routing: Fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Ensure index.html itself is NOT cached
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static Assets (Vite hashes these, so 1y is perfect)
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off; # Save disk I/O for static assets
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}